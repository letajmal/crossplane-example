global:
  domain: argocd.nip.io

# Minimal Footprint Tweak: Scale down resources for local development
controller:
  replicas: 1
  resources:
    limits:
      cpu: "500m"
      memory: 512Mi
    requests:
      cpu: "100m"
      memory: 256Mi

server:
  replicas: 1
  resources:
    limits:
      cpu: "500m"
      memory: 512Mi
    requests:
      cpu: "100m"
      memory: 256Mi
      
repoServer:
  replicas: 1

configs:
  params:
    server.insecure: "true" # Disables internal SSL generation to speed up KinD processing

# Disable non-essential components to save local machine RAM
dex:
  enabled: false # Disables built-in authentication matrix since it's a local cluster
notifications:
  enabled: false # Strips out background notification controllers
applicationSet:
  enabled: false # Turn off unless you explicitly need automated matrix deployments